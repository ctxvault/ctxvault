name: Mac App Alpha feedback
description: Share launch, Gatekeeper, first-run, and local feedback-bundle notes for the notarized Mac App Alpha.
title: "[Mac App Alpha] "
labels:
  - workflow
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this only for the optional notarized Mac App Alpha artifact. Do not paste secrets, private source text, or raw logs. Prefer sanitized symptoms, receipt filenames, and whether a local feedback bundle was created.
  - type: input
    id: macos_version
    attributes:
      label: macOS version and chip
      placeholder: macOS 15.x, Apple Silicon or Intel
    validations:
      required: true
  - type: dropdown
    id: install_result
    attributes:
      label: Install or launch result
      options:
        - launched successfully
        - Gatekeeper blocked
        - app opened but Workbench did not load
        - app launched but first-run path was unclear
        - checksum or unzip problem
        - other
    validations:
      required: true
  - type: dropdown
    id: first_run_step
    attributes:
      label: Where did the first-run path stop?
      options:
        - before launch
        - Workbench loaded
        - Demo Vault seeded
        - Preview Plan ran
        - receipt generated
        - gallery opened
        - feedback bundle exported
        - not applicable
    validations:
      required: true
  - type: textarea
    id: symptom
    attributes:
      label: What happened?
      description: Include the exact visible error wording if it is safe to share.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized local evidence
      description: Share checksum, release asset name, receipt filename, feedback-bundle basename, or short non-secret output.
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: What did you expect next?
      description: Describe the next action you expected the app to make obvious.
    validations:
      required: false
