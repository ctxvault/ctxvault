name: v0.4.0 first-run feedback
description: Share concrete Day 0 feedback after trying the v0.4.0 demo, gallery, or core path.
title: "[v0.4.0 First Run] "
labels:
  - workflow
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this for first-run feedback on the v0.4.0 release surface. Please do not paste secrets, private source text, or raw logs. Receipt filenames, sanitized paths, and local feedback-bundle summaries are enough for first triage.
  - type: dropdown
    id: entrypoint
    attributes:
      label: What did you try first?
      options:
        - GitHub README quick start
        - v0.4.0 release artifact
        - Demo Vault path
        - Receipt/Trust Gallery
        - CLI context-extract path
        - receipt-inspect path
        - other
    validations:
      required: true
  - type: dropdown
    id: progress
    attributes:
      label: How far did you get?
      options:
        - opened gallery
        - generated receipt
        - saw blocked receipt
        - ran deterministic checks
        - could not start
        - stopped because wording was unclear
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What did you run or open?
      description: Name the command, page, release asset, fixture, or receipt path you touched.
      placeholder: python3 scripts/run_v034_context_extract_stability.py --root /tmp/ctxvault-v040-first-run
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: What was the first confusing or broken step?
      description: Be specific about the step, text, command output, or receipt field.
    validations:
      required: true
  - type: textarea
    id: trust_gap
    attributes:
      label: What did you still not trust or understand?
      description: Mention selected context, blocked context, projection writes, receipt chain, privacy boundary, or install expectations.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Share sanitized receipt filenames, bundle path basename, checksum, command name, or short non-secret output.
    validations:
      required: false
  - type: textarea
    id: improvement
    attributes:
      label: Smallest useful improvement
      description: What one change would have made this first run clearer?
    validations:
      required: false
